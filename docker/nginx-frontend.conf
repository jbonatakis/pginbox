server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files $uri =404;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location ~ ^/.+\.[^/]+$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
