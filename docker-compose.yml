services:
  db:
    image: pginbox-pg-textsearch:local
    build:
      context: .
      dockerfile: Dockerfile.pg_textsearch
    command: ["postgres", "-c", "shared_preload_libraries=pg_textsearch"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: pginbox
      POSTGRES_USER: pginbox
      POSTGRES_PASSWORD: pginbox
    ports:
      - "5499:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
