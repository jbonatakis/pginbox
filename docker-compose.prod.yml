# Production / VPS: API + frontend behind Caddy. DB is Supabase (set DATABASE_URL).
# Usage: DATABASE_URL=postgresql://... docker compose -f docker-compose.prod.yml up -d

services:
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: pginbox-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_BASE_URL=${APP_BASE_URL}
      - AUTH_EMAIL_MODE=${AUTH_EMAIL_MODE}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
    # No published ports; Caddy proxies /api to this

  mailbox-ingest:
    build:
      context: .
      dockerfile: Dockerfile.mailbox-ingest
    image: pginbox-mailbox-ingest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FASTMAIL_API_TOKEN=${FASTMAIL_API_TOKEN}
      - FASTMAIL_JMAP_SESSION_URL=${FASTMAIL_JMAP_SESSION_URL}
      - MAILBOX_INGEST_PARSER_BIN=${MAILBOX_INGEST_PARSER_BIN}
      - MAILBOX_INGEST_PUSH_PING_SECONDS=${MAILBOX_INGEST_PUSH_PING_SECONDS}
      - MAILBOX_INGEST_QUERY_PAGE_SIZE=${MAILBOX_INGEST_QUERY_PAGE_SIZE}
      - MAILBOX_INGEST_RECEIPT_BATCH_SIZE=${MAILBOX_INGEST_RECEIPT_BATCH_SIZE}
      - MAILBOX_INGEST_SYNC_DEBOUNCE_MS=${MAILBOX_INGEST_SYNC_DEBOUNCE_MS}
    # No published ports; long-lived worker only

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: pginbox-frontend
    restart: unless-stopped
    # No published ports; Caddy proxies / to this

volumes:
  caddy_data:
  caddy_config:
